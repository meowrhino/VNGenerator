<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wallDay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d9a8"/>
      <stop offset="0.55" stop-color="#e9b277"/>
      <stop offset="1" stop-color="#a06a3a"/>
    </linearGradient>
    <linearGradient id="floorDay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c4a25"/>
      <stop offset="1" stop-color="#3d2410"/>
    </linearGradient>
    <linearGradient id="windowDay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5c4"/>
      <stop offset="1" stop-color="#ffb172"/>
    </linearGradient>
    <linearGradient id="deskDay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c98c52"/>
      <stop offset="1" stop-color="#7a4a23"/>
    </linearGradient>
    <radialGradient id="sunRay" cx="0.78" cy="0.18" r="0.5">
      <stop offset="0" stop-color="#fff3c4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#wallDay)"/>

  <!-- Ventanas grandes a la derecha -->
  <g>
    <rect x="1180" y="180" width="640" height="500" fill="url(#windowDay)" stroke="#5d3a1d" stroke-width="14"/>
    <line x1="1500" y1="180" x2="1500" y2="680" stroke="#5d3a1d" stroke-width="10"/>
    <line x1="1180" y1="430" x2="1820" y2="430" stroke="#5d3a1d" stroke-width="10"/>
    <!-- Cortinas atadas -->
    <path d="M1180 180 L1140 200 L1170 360 L1200 360 Z" fill="#c64f6a" opacity="0.85"/>
    <path d="M1820 180 L1860 200 L1830 360 L1800 360 Z" fill="#c64f6a" opacity="0.85"/>
  </g>

  <!-- Rayo de sol -->
  <rect width="1920" height="1080" fill="url(#sunRay)"/>

  <!-- Pizarra -->
  <rect x="200" y="200" width="700" height="320" fill="#1f3325" stroke="#3a2511" stroke-width="14"/>
  <text x="550" y="380" font-family="Georgia, serif" font-size="78" font-style="italic" fill="#f1e4c6" text-anchor="middle" opacity="0.7">第一章</text>

  <!-- Suelo -->
  <rect x="0" y="780" width="1920" height="300" fill="url(#floorDay)"/>
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#1a0d04" stroke-width="4"/>

  <!-- Pupitres alineados -->
  <g opacity="0.92">
    <rect x="120" y="820" width="220" height="120" fill="url(#deskDay)" rx="4"/>
    <rect x="140" y="940" width="20" height="100" fill="#3d2410"/>
    <rect x="300" y="940" width="20" height="100" fill="#3d2410"/>

    <rect x="500" y="850" width="220" height="120" fill="url(#deskDay)" rx="4"/>
    <rect x="520" y="970" width="20" height="100" fill="#3d2410"/>
    <rect x="680" y="970" width="20" height="100" fill="#3d2410"/>

    <rect x="880" y="820" width="220" height="120" fill="url(#deskDay)" rx="4"/>
    <rect x="900" y="940" width="20" height="100" fill="#3d2410"/>
    <rect x="1060" y="940" width="20" height="100" fill="#3d2410"/>

    <rect x="1280" y="850" width="220" height="120" fill="url(#deskDay)" rx="4"/>
    <rect x="1300" y="970" width="20" height="100" fill="#3d2410"/>
    <rect x="1460" y="970" width="20" height="100" fill="#3d2410"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="vigDay" cx="0.5" cy="0.5" r="0.75">
    <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.4"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vigDay)"/>
</svg>
