<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1080" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="hairAnaS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3a24"/>
      <stop offset="0.5" stop-color="#7a4d2e"/>
      <stop offset="1" stop-color="#3a2418"/>
    </linearGradient>
    <linearGradient id="uniformAnaS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e4a78"/>
      <stop offset="1" stop-color="#1f2748"/>
    </linearGradient>
    <linearGradient id="skinAnaS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde2cc"/>
      <stop offset="1" stop-color="#f0c8a8"/>
    </linearGradient>
  </defs>

  <!-- Falda -->
  <path d="M180 880 L420 880 L460 1080 L140 1080 Z" fill="#9c2c46"/>
  <g stroke="#5e1a2a" stroke-width="2" opacity="0.7">
    <line x1="220" y1="880" x2="200" y2="1080"/>
    <line x1="260" y1="880" x2="260" y2="1080"/>
    <line x1="300" y1="880" x2="300" y2="1080"/>
    <line x1="340" y1="880" x2="340" y2="1080"/>
    <line x1="380" y1="880" x2="400" y2="1080"/>
  </g>

  <!-- Torso / blusa -->
  <path d="M200 620 L400 620 L420 900 L180 900 Z" fill="url(#uniformAnaS)"/>
  <!-- Cuello marinero blanco -->
  <path d="M250 620 L350 620 L370 720 L300 760 L230 720 Z" fill="#f4f4f8"/>
  <path d="M260 620 L340 620 L360 700 L300 740 L240 700 Z" fill="url(#uniformAnaS)"/>
  <!-- Lazo rojo -->
  <path d="M270 700 L330 700 L340 740 L300 730 L260 740 Z" fill="#c12a3c"/>
  <circle cx="300" cy="715" r="6" fill="#7a1a26"/>

  <!-- Brazos -->
  <path d="M195 640 L150 880 L185 890 L235 660 Z" fill="url(#uniformAnaS)"/>
  <path d="M405 640 L450 880 L415 890 L365 660 Z" fill="url(#uniformAnaS)"/>
  <!-- Manos -->
  <ellipse cx="167" cy="888" rx="22" ry="26" fill="url(#skinAnaS)"/>
  <ellipse cx="433" cy="888" rx="22" ry="26" fill="url(#skinAnaS)"/>

  <!-- Cuello -->
  <rect x="278" y="555" width="44" height="80" fill="url(#skinAnaS)"/>

  <!-- Cara -->
  <ellipse cx="300" cy="475" rx="115" ry="135" fill="url(#skinAnaS)"/>
  <!-- Sombra mejilla -->
  <ellipse cx="240" cy="510" rx="22" ry="14" fill="#f7b89a" opacity="0.55"/>
  <ellipse cx="360" cy="510" rx="22" ry="14" fill="#f7b89a" opacity="0.55"/>

  <!-- Pelo trasero -->
  <path d="M180 380 Q160 600 220 720 L180 740 Q120 580 160 360 Z" fill="url(#hairAnaS)"/>
  <path d="M420 380 Q440 600 380 720 L420 740 Q480 580 440 360 Z" fill="url(#hairAnaS)"/>
  <!-- Pelo flequillo -->
  <path d="M195 360 Q200 480 240 460 Q260 420 250 380 Q300 360 350 380 Q340 420 360 460 Q400 480 405 360 Q380 280 300 270 Q220 280 195 360 Z" fill="url(#hairAnaS)"/>
  <!-- Mechones laterales -->
  <path d="M198 440 Q175 540 195 600 Q210 540 215 460 Z" fill="url(#hairAnaS)"/>
  <path d="M402 440 Q425 540 405 600 Q390 540 385 460 Z" fill="url(#hairAnaS)"/>

  <!-- Ojos (sonriendo: arcos cerrados) -->
  <path d="M235 470 Q255 458 275 470" stroke="#2a1810" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M325 470 Q345 458 365 470" stroke="#2a1810" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Pestañas -->
  <path d="M232 470 L228 463" stroke="#2a1810" stroke-width="3" stroke-linecap="round"/>
  <path d="M368 470 L372 463" stroke="#2a1810" stroke-width="3" stroke-linecap="round"/>

  <!-- Cejas -->
  <path d="M240 440 Q260 432 278 440" stroke="#3a2818" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M322 440 Q340 432 360 440" stroke="#3a2818" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Nariz -->
  <path d="M298 510 Q302 525 308 530" stroke="#c89878" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Boca sonriente -->
  <path d="M275 555 Q300 575 325 555" stroke="#a04050" stroke-width="4" fill="#e87a86" stroke-linejoin="round"/>
  <path d="M283 558 Q300 565 317 558" fill="#fff" opacity="0.8"/>

  <!-- Brillo en pelo -->
  <path d="M250 320 Q300 305 350 320 L340 360 Q300 350 260 360 Z" fill="#c08a5c" opacity="0.5"/>
</svg>
